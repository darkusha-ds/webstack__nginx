# 20-ticket-flow.conf

# HTTP -> HTTPS
server {
  listen 80;
  server_name mail.ticket-flow.ru;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name mail.ticket-flow.ru;

  ssl_certificate     /etc/letsencrypt/live/ticket-flow.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ticket-flow.ru/privkey.pem;

  client_max_body_size 0;

  proxy_buffer_size          128k;
  proxy_buffers              4 256k;
  proxy_busy_buffers_size    256k;

  location / {
    proxy_pass https://host.docker.internal:8444;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Ssl on;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    proxy_ssl_server_name on;
    proxy_ssl_verify off;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
}

server {
  listen 80;
  server_name ticket-flow.ru *.ticket-flow.ru;
  return 301 https://$host$request_uri;
}

# -------------------------
# zov.ticket-flow.ru -> host.docker.internal:13103+18081
# -------------------------
server {
  listen 443 ssl; # временно без http2
  server_name zov-dev.ticket-flow.ru;

  ssl_certificate     /etc/letsencrypt/live/ticket-flow.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ticket-flow.ru/privkey.pem;

  # ВРЕМЕННО выключи security include для проверки
  # include /etc/nginx/include/server/10-security-server.conf;
  # if ($bad_ua) { return 444; }

  location /api/ {
    proxy_pass http://host.docker.internal:13103/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://host.docker.internal:18081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

